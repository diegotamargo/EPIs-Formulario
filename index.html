<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Petición EPIs INGECA (Word Export)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.7"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react/": "https://esm.sh/react@18.3.1/",
            "react-dom": "https://esm.sh/react-dom@18.3.1",
            "react-dom/": "https://esm.sh/react-dom@18.3.1/",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
            "lucide-react": "https://esm.sh/lucide-react@0.474.0?external=react",
            "docx": "https://esm.sh/docx@8.5.0"
        }
    }
    </script>
</head>
<body class="bg-gray-50 p-4">
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { AlertTriangle, Download, CheckCircle } from 'lucide-react';
        import { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, ImageRun, WidthType, AlignmentType, VerticalAlign } from 'docx';

        const PUESTOS = [
            "Ingeniería", "Administración", "RRHH", "AT", 
            "Delineación", "Topografía", "Informática", 
            "GIS-Delineación", "Ingeniería/AT", "Medio Ambiente", 
            "Dirección", "Asistencia Oficinas"
        ];

        const EPIS_CATALOGO = [
            { id: 1, nombre: "Casco de seguridad", talla: false },
            { id: 2, nombre: "Guantes de protección mecánica (Nylon Bricofire)", talla: false },
            { id: 3, nombre: "Gafas de protección anti polvo (Tector)", talla: false },
            { id: 4, nombre: "Protectores auditivos (3M)", talla: false },
            { id: 8, nombre: "Camiseta manga larga térmica (Wedze BL500)", talla: 'camiseta' },
            { id: 9, nombre: "Camiseta protección solar larga", talla: 'camiseta' },
            { id: 10, nombre: "Camiseta protección solar corta", talla: 'camiseta' },
            { id: 11, nombre: "Camiseta manga corta algodón", talla: 'camiseta' },
            { id: 6, nombre: "Chaquetón agua / alta visibilidad (Portwest S466)", talla: 'chaqueta' },
            { id: 12, nombre: "Sudadera cálida", talla: 'chaqueta' },
            { id: 7, nombre: "Pantalón de obra (Forclaz MT100)", talla: 'pantalon' },
            { id: 5, nombre: "Botas de agua (Paredes SP5035 H2O)", talla: 'zapato' },
            { id: 13, nombre: "Botas de seguridad (Robusta Dascilus S3)", talla: 'zapato' },
            { id: 14, nombre: "Playeros de seguridad (Goodyear multicolor)", talla: 'zapato' }
        ];

        function App() {
            const [nombre, setNombre] = useState('');
            const [puesto, setPuesto] = useState(PUESTOS[0]);
            const [recibido, setRecibido] = useState('Sí');
            const [tallas, setTallas] = useState({ chaqueta: '', pantalon: '', camiseta: '', zapato: '' });
            const [selectedEpis, setSelectedEpis] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [status, setStatus] = useState('');

            const handleToggleEpi = (id) => {
                setSelectedEpis(prev => Array.from(new Set(
                    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                )));
            };

            const fetchImageBuffer = async (url) => {
                const response = await window.fetch(url, { credentials: 'omit' });
                if (!response.ok) throw new Error(\`HTTP fetch failed: \${response.status}\`);
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(blob);
                });
            };

            const handleGenerate = async () => {
                if (!nombre) {
                    alert('Por favor introduzca el nombre del trabajador.');
                    return;
                }
                setIsGenerating(true);
                setStatus('Construyendo documento internamente...');

                try {
                    // Ahora usa los archivos locales que estarán alojados en el propio Vercel
                    const logoBuffer = await fetchImageBuffer("./logo.png");
                    const firmaBuffer = await fetchImageBuffer("./firma.png");

                    const fechaActual = new Date();
                    const dateStr = fechaActual.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }) + " , " + fechaActual.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                    const episTableRows = [
                        new TableRow({
                            children: [
                                new TableCell({ margins: { top: 100, bottom: 100, left: 100, right: 100 }, children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "Descripción", bold: true, font: "Calibri", size: 22 })] })] }),
                                new TableCell({ margins: { top: 100, bottom: 100, left: 100, right: 100 }, children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "Recibido/Confirmado *", bold: true, font: "Calibri", size: 22 })] })] }),
                                new TableCell({ margins: { top: 100, bottom: 100, left: 100, right: 100 }, children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "Fecha de Entrega", bold: true, font: "Calibri", size: 22 })] })] })
                            ]
                        }),
                        ...selectedEpis.map(epiId => {
                            const epiMenu = EPIS_CATALOGO.find(e => e.id === epiId);
                            let assignedTalla = "N/A";
                            if (epiMenu.talla) assignedTalla = tallas[epiMenu.talla] || "No indicada";
                            return new TableRow({
                                children: [
                                    new TableCell({
                                        margins: { top: 100, bottom: 100, left: 100, right: 100 },
                                        children: [
                                            new Paragraph({ children: [new TextRun({ text: "- " + epiMenu.nombre + " (Talla: " + assignedTalla + ")", bold: true, font: "Calibri", size: 22 })] })
                                        ]
                                    }),
                                    new TableCell({
                                        margins: { top: 100, bottom: 100, left: 100, right: 100 },
                                        verticalAlign: VerticalAlign.CENTER,
                                        children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: recibido, bold: true, font: "Calibri", size: 22 })] })]
                                    }),
                                    new TableCell({
                                        margins: { top: 100, bottom: 100, left: 100, right: 100 },
                                        verticalAlign: VerticalAlign.CENTER,
                                        children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: dateStr, bold: true, font: "Calibri", size: 22 })] })]
                                    })
                                ]
                            });
                        })
                    ];

                    const doc = new Document({
                        sections: [{
                            properties: {},
                            children: [
                                new Table({
                                    width: { size: 100, type: WidthType.PERCENTAGE },
                                    rows: [
                                        new TableRow({
                                            children: [
                                                new TableCell({
                                                    width: { size: 30, type: WidthType.PERCENTAGE },
                                                    verticalAlign: VerticalAlign.CENTER,
                                                    margins: { top: 200, bottom: 200, left: 100, right: 100 },
                                                    children: [
                                                        new Paragraph({
                                                            alignment: AlignmentType.CENTER,
                                                            children: [
                                                                new ImageRun({
                                                                    data: logoBuffer,
                                                                    transformation: { width: 140, height: 60 },
                                                                })
                                                            ]
                                                        })
                                                    ]
                                                }),
                                                new TableCell({
                                                    width: { size: 70, type: WidthType.PERCENTAGE },
                                                    verticalAlign: VerticalAlign.CENTER,
                                                    margins: { top: 200, bottom: 200, left: 100, right: 100 },
                                                    children: [
                                                        new Paragraph({
                                                            alignment: AlignmentType.CENTER,
                                                            spacing: { before: 200, after: 200 },
                                                            children: [
                                                                new TextRun({
                                                                    text: "CONTROL DE ENTREGA, USO Y MANTENIMIENTO DE LOS EPIS",
                                                                    bold: true,
                                                                    font: "Calibri",
                                                                    size: 30,
                                                                })
                                                            ]
                                                        })
                                                    ]
                                                })
                                            ]
                                        })
                                    ]
                                }),
                                
                                new Paragraph({ text: "", spacing: { before: 400, after: 100 } }),
                                
                                new Paragraph({
                                    children: [
                                        new TextRun({
                                            text: "Según lo establecido en el Art. 17 de la Ley de Prevención de Riesgos Laborales, la empresa entrega al trabajador abajo mencionado los siguientes equipos de protección para su uso personal en las actividades que desempeña en su puesto de trabajo.",
                                            font: "Calibri",
                                            size: 22,
                                        })
                                    ],
                                    spacing: { before: 100, after: 200 }
                                }),
                                
                                new Paragraph({ children: [
                                    new TextRun({ text: "Nombre del trabajador: ", bold: true, font: "Calibri", size: 22 }), 
                                    new TextRun({ text: nombre, font: "Calibri", size: 22 })
                                ] }),
                                new Paragraph({ children: [
                                    new TextRun({ text: "Puesto de trabajo: ", bold: true, font: "Calibri", size: 22 }), 
                                    new TextRun({ text: puesto, font: "Calibri", size: 22 })
                                ] }),
                                new Paragraph({ text: "", spacing: { before: 200, after: 200 } }),
                                
                                new Table({
                                    width: { size: 100, type: WidthType.PERCENTAGE },
                                    rows: episTableRows
                                }),

                                new Paragraph({ text: "", spacing: { before: 600, after: 200 } }),
                                
                                new Paragraph({
                                    alignment: AlignmentType.CENTER,
                                    children: [
                                        new TextRun({ text: "Firma responsable:", bold: true, font: "Calibri", size: 22 })
                                    ]
                                }),
                                new Paragraph({
                                    alignment: AlignmentType.CENTER,
                                    children: [
                                        new ImageRun({
                                            data: firmaBuffer,
                                            transformation: { width: 180, height: 90 },
                                        })
                                    ]
                                })
                            ]
                        }]
                    });

                    setStatus('Empaquetando documento...');
                    const blob = await Packer.toBlob(doc);
                    const docUrl = window.URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = docUrl;
                    link.download = "EstandarEPIs_" + nombre.replace(/ /g,"_") + ".docx";
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    window.URL.revokeObjectURL(docUrl);

                    setStatus('¡Petición generada y descargada!');
                    
                } catch (error) {
                    console.error("Error generating doc: ", error);
                    alert("Se produjo un error generando el Word. Detalles: " + error.message);
                } finally {
                    setIsGenerating(false);
                    setTimeout(() => setStatus(''), 4000);
                }
            };

            return (
                <div className="max-w-4xl mx-auto font-sans bg-white shadow-lg border border-gray-200">
                    <div className="bg-red-50 text-red-700 border-b border-red-200 p-6">
                        <div className="flex items-start gap-4">
                            <AlertTriangle className="w-8 h-8 flex-shrink-0 mt-1" />
                            <div>
                                <h1 className="text-xl font-bold uppercase mb-2">Aviso Importante</h1>
                                <p className="text-red-900 font-semibold text-lg leading-relaxed">
                                    Rellene este formulario y, una vez descargue su petición de EPIs (archivo Word), 
                                    adjúntela y envíela a <a href="mailto:alejandra.gonzalez@ingeca.com?subject=Solicitud%20de%20EPIs" className="underline hover:text-red-950">alejandra.gonzalez@ingeca.com</a> por correo electrónico para proceder con su tramitación.
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="p-8 space-y-10">
                        <section>
                            <h2 className="text-xl font-bold text-gray-800 mb-6 border-b pb-2">1. Datos Personales</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Nombre del trabajador</label>
                                    <input 
                                        type="text" 
                                        value={nombre} 
                                        onChange={e => setNombre(e.target.value)} 
                                        className="w-full border border-gray-300 rounded p-2 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        placeholder="Introduzca el nombre..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Puesto de trabajo</label>
                                    <select 
                                        value={puesto} 
                                        onChange={e => setPuesto(e.target.value)} 
                                        className="w-full border border-gray-300 rounded p-2 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none"
                                    >
                                        {PUESTOS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">¿Recibido / Confirmado?</label>
                                    <select 
                                        value={recibido} 
                                        onChange={e => setRecibido(e.target.value)} 
                                        className="w-full border border-gray-300 rounded p-2 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none"
                                    >
                                        <option value="Sí">Sí</option>
                                        <option value="Aún no">Aún no</option>
                                    </select>
                                </div>
                            </div>
                        </section>

                        <section>
                            <h2 className="text-xl font-bold text-gray-800 mb-6 border-b pb-2">2. Registro de Tallas</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 bg-gray-50 p-6 rounded-lg border border-gray-200">
                                {['chaqueta', 'pantalon', 'camiseta', 'zapato'].map(prenda => (
                                    <div key={prenda}>
                                        <label className="block text-sm font-semibold text-gray-700 mb-1 capitalize">Talla {prenda}</label>
                                        <input 
                                            type="text" 
                                            value={tallas[prenda]} 
                                            onChange={e => setTallas({...tallas, [prenda]: e.target.value})} 
                                            className="w-full border border-gray-300 rounded p-2 text-center focus:ring-2 focus:ring-blue-500 outline-none"
                                            placeholder={prenda === 'zapato' ? "Ej: 42" : "Ej: L"}
                                        />
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section>
                            <h2 className="text-xl font-bold text-gray-800 mb-6 border-b pb-2">3. Catálogo de EPIs</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {EPIS_CATALOGO.map(epi => (
                                    <label key={epi.id} className={\`flex items-start gap-3 p-4 border rounded cursor-pointer transition-colors \${selectedEpis.includes(epi.id) ? 'bg-blue-50 border-blue-300' : 'hover:bg-gray-50 border-gray-200'}\`}>
                                        <input 
                                            type="checkbox" 
                                            checked={selectedEpis.includes(epi.id)} 
                                            onChange={() => handleToggleEpi(epi.id)} 
                                            className="w-5 h-5 mt-0.5 rounded text-blue-600 focus:ring-blue-500"
                                        />
                                        <div className="flex-1">
                                            <span className="font-medium text-gray-800">{epi.nombre}</span>
                                            {epi.talla && (
                                                <div className="text-xs text-gray-500 mt-1">Requiere talla de: <span className="capitalize">{epi.talla}</span></div>
                                            )}
                                        </div>
                                    </label>
                                ))}
                            </div>
                        </section>

                        <div className="pt-6 border-t flex items-center justify-between">
                            <div className="text-sm text-gray-500 flex-1">
                                {status && <span className="flex items-center gap-2 text-green-600"><CheckCircle className="w-4 h-4"/> {status}</span>}
                            </div>
                            <button 
                                onClick={handleGenerate} 
                                disabled={isGenerating}
                                className={\`flex items-center gap-2 px-8 py-3 rounded-lg text-white font-bold transition-all \${isGenerating ? 'bg-gray-400 cursor-wait' : 'bg-gray-800 hover:bg-gray-900 shadow-md hover:shadow-lg'}\`}
                            >
                                <Download className="w-5 h-5" />
                                {isGenerating ? 'Generando Word...' : 'Generar Petición'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
